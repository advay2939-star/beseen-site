<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact · BeSeen</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --cream:#faf7f4;
  --rose:#c4866a;
  --deep:#2a1f1a;
  --mid:#7a5c50;
  --border:rgba(196,134,106,0.2);
  --green:#406c5c;
}

body {
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--deep);
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  border-bottom:1px solid var(--border);
}

.logo {
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  letter-spacing:2px;
}

.nav a {
  margin:0 14px;
  text-decoration:none;
  color:var(--mid);
  font-size:14px;
}

.cta {
  background:var(--green);
  color:white;
  padding:10px 18px;
  border-radius:30px;
  font-size:13px;
}

/* CONTENT */
.container {
  max-width:720px;
  margin:100px auto;
  padding:0 20px;
  text-align:center;
}

h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:44px;
  margin-bottom:14px;
}

.sub {
  color:var(--mid);
  font-size:15px;
  margin-bottom:40px;
}

/* CARD */
.contact-card {
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.04);
}

.email {
  font-size:18px;
  font-weight:500;
  color:var(--deep);
  margin-bottom:10px;
}

.note {
  font-size:14px;
  color:var(--mid);
}

/* OPTIONAL WHATSAPP STYLE */
.whatsapp {
  margin-top:24px;
  display:inline-block;
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:30px;
  font-size:13px;
  text-decoration:none;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:30px;
  border-top:1px solid var(--border);
  font-size:12px;
  color:var(--mid);
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">BeSeen.</div>
  <div class="nav">
    <a href="/">Home</a>
    <a href="/#how">How It Works</a>
    <a href="/contact.html">Contact</a>
  </div>
  <div class="cta">Start Your Journey →</div>
</header>

<div class="container">
  <h1>Contact Us</h1>
  <div class="sub">Have a question or need help with your skin journey? We're here for you.</div>

  <div class="contact-card">
    <div class="email">beseen.skin@gmail.com</div>
    <div class="note">We typically respond within 24 hours.</div>

    <!-- OPTIONAL WHATSAPP BUTTON (add your number later) -->
    <!--
    <a href="https://wa.me/91XXXXXXXXXX" class="whatsapp">
      Chat on WhatsApp
    </a>
    -->
  </div>
</div>

<footer class="footer">
  © 2026 BeSeen · All rights reserved
</footer>

</body>
</html>
