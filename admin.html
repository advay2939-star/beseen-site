<!DOCTYPE html>
<html>
<head>
  <title>BeSeen Admin</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Client Submissions</h1>

<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
  "https://rkhlfmfubwszgslxiloh.supabase.co",
  "sb_publishable_vkOdWllAwG12e9-roiMIdA_I6N2YZ8f"
);

async function loadData() {
  const { data, error } = await supabase
    .from("submissions")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const container = document.getElementById("list");
  container.innerHTML = "";

  data.forEach(user => {
    const div = document.createElement("div");

    div.innerHTML = `
      <h3>${user.name}</h3>
      <p>${user.email}</p>
      <button onclick='generatePrompt(${JSON.stringify(user)})'>
        Generate Prompt
      </button>
      <pre id="prompt-${user.id}"></pre>
      <button onclick="copyPrompt('${user.id}')">Copy</button>
      <hr/>
    `;

    container.appendChild(div);
  });
}

function generatePrompt(user) {
  const prompt = `
You are a professional dermatologist.

Client Details:
Name: ${user.name}
Age: ${user.age}
Skin Type: ${user.skintype}
Concerns: ${user.concerns}
Sleep: ${user.sleep}
Water Intake: ${user.water}
Stress: ${user.stress}

TASK:
1. Analyse skin condition deeply
2. Identify root causes
3. Give AM + PM routine
4. Suggest ingredients (not brands)
5. Keep it practical

Tone: premium, expert, personalised
`;

  document.getElementById("prompt-" + user.id).innerText = prompt;
}

function copyPrompt(id) {
  const text = document.getElementById("prompt-" + id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

loadData();
</script>

</body>
</html>
